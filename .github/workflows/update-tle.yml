name: Update Starlink TLEs

on:
  schedule:
    - cron: '15 */2 * * *'  # Every 2 hours at :15
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch TLEs from CelesTrak
        run: |
          HTTP_CODE=$(curl -sf -A "StarNav/1.2 (github.com/jack7169/starnav-data)" \
            -w "%{http_code}" \
            "https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle" \
            -o /tmp/starlink.tle 2>/dev/null || echo "000")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "CelesTrak returned HTTP $HTTP_CODE — skipping update (rate limited or error)"
            echo "SKIP=true" >> $GITHUB_ENV
            exit 0
          fi

          # Verify we got actual TLE data (not an error page)
          LINE_COUNT=$(wc -l < /tmp/starlink.tle)
          if [ "$LINE_COUNT" -lt 100 ]; then
            echo "Response too small ($LINE_COUNT lines) — likely error page, skipping"
            echo "SKIP=true" >> $GITHUB_ENV
            exit 0
          fi

          python3 -c "
          import json
          with open('/tmp/starlink.tle') as f:
              lines = [l.strip() for l in f if l.strip()]
          sats = []
          for i in range(0, len(lines)-2, 3):
              sats.append({'name': lines[i], 'line1': lines[i+1], 'line2': lines[i+2]})
          if len(sats) < 100:
              print(f'Only {len(sats)} sats parsed — too few, skipping')
              exit(1)
          with open('tle/starlink.json', 'w') as f:
              json.dump(sats, f)
          print(f'{len(sats)} satellites')
          "

          date -u +%Y-%m-%dT%H:%M:%SZ > tle/last_updated.txt

      - name: Commit if changed
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tle/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update Starlink TLEs $(cat tle/last_updated.txt)"
            git push
          fi
